name: Adversarial audit

# LLM red-team advisory layer (CodeQL or SAST stays the merge gate).
# Public repo: checkout this script repo and run inline.
#   pr   -> @cf/moonshotai/kimi-k2.7-code on merge-base diff
#   repo -> moonshotai/kimi-k3 full tree (workflow_dispatch only; needs CF_AIG_TOKEN)
#
# Required secrets (repo or org): CF_AIG_TOKEN, CLOUDFLARE_API_TOKEN
# Required vars (repo or org):    CLOUDFLARE_ACCOUNT_ID, AI_GATEWAY_ID

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: pr (K2.7 diff) or repo (K3 full tree)
        required: true
        type: choice
        options:
          - pr
          - repo
        default: pr

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adversarial-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout audit scripts
        uses: actions/checkout@v4
        with:
          repository: skyphusion-labs/security-audit
          ref: v0.1.0
          path: security-audit

      - name: Run adversarial audit
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
          AI_GATEWAY_ID: ${{ vars.AI_GATEWAY_ID }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          AUDIT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pr' }}
        run: |
          set -euo pipefail
          mode="${AUDIT_MODE}"
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID unset (org or repo variable)"
            exit 2
          fi
          if [[ "$mode" == "pr" && -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN required for pr mode"
            exit 2
          fi
          if [[ "$mode" == "repo" && -z "${CF_AIG_TOKEN:-}" ]]; then
            echo "::error::CF_AIG_TOKEN required for repo mode"
            exit 2
          fi
          args=(--mode "$mode" --output json --out-file audit.json --md-file audit-report.md --fail-on none)
          node security-audit/adversarial-audit.mjs "${args[@]}"

      - name: Post PR comment (advisory)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash security-audit/post-pr-comment.sh \
            "${{ github.event.pull_request.number }}" \
            audit-report.md

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-audit
          path: |
            audit.json
            audit-report.md
