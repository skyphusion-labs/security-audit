name: Adversarial audit

# LLM red-team advisory layer (CodeQL or SAST stays the merge gate).
# Private/internal repo: call a reusable workflow that wraps the audit scripts.
#   pr   -> @cf/moonshotai/kimi-k2.7-code on merge-base diff
#   repo -> moonshotai/kimi-k3 full tree (workflow_dispatch or scheduled deep audit)
#
# Required secrets (repo or org): CF_AIG_TOKEN, CLOUDFLARE_API_TOKEN
# Required vars (repo or org):    CLOUDFLARE_ACCOUNT_ID, AI_GATEWAY_ID
#
# Replace YOUR_ORG with your GitHub org and pin the reusable workflow ref (tag or SHA).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: pr (K2.7 diff) or repo (K3 full tree)
        required: true
        type: choice
        options:
          - pr
          - repo
        default: pr

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adversarial-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: YOUR_ORG/security-audit/.github/workflows/adversarial-audit-reusable.yml@v0.1.0
    secrets:
      CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    with:
      mode: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pr' }}
      post_pr_comment: true
      fail_on: none
